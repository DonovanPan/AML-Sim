name: aml_orderbook_replay
description: >
  First AML wrapper orderbook smoke test. This keeps StockSim unchanged and
  runs AAPL with the minimum synthetic AML market roles.
rabbitmq_host: localhost

stocksim_config:
  exchange_mode: orderbook

  instruments:
    - AAPL

  exchanges:
    AAPL:
      data_source: synthetic
      symbol_type: stock
      candle_interval: 1d
      warmup_candles: 0

  agents:
    market_maker:
      type: AML_Market_Maker
      count: 1
      parameters:
        initial_cash: 1000000
        action_interval: 1m
        fair_price: 100.0
        spread: 0.2
        quote_size: 100
        target_inventory: 10000
        inventory_skew: 0.001
        initial_positions:
          AAPL: 10000
        initial_cost_basis:
          AAPL: 100.0

    retail_population:
      type: AML_Retail_Trader
      count: 5
      parameters:
        initial_cash: 25000
        action_interval: 1m
        trade_probability: 0.35
        max_order_size: 20
        buy_bias: 0.5
        initial_positions:
          AAPL: 0
        initial_cost_basis:
          AAPL: 100.0

    institutional_trader:
      type: AML_Institutional_Trader
      count: 1
      parameters:
        initial_cash: 500000
        action_interval: 5m
        target_positions:
          AAPL: 500
        child_order_size: 100
        order_type: MARKET
        initial_positions:
          AAPL: 0
        initial_cost_basis:
          AAPL: 100.0

  simulation:
    start_time: "2025-03-01T09:30:00Z"
    end_time: "2025-03-01T10:00:00Z"
    tick_interval: 5m
    expected_exchange_agent_count: 1

  environment:
    rabbitmq_host: localhost
    log_level: INFO
